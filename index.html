<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./styles.css">

</head>

<body>
    <header>
        <div class="contenido-header">
            <h1>GENERADOR DE COLORES</h1>
            <p class="descripcion">
                Crea paletas de colores equilibradas para mejorar la identidad visual de tus proyectos.
            </p>
            <!-- <p>Bienvenido a mi página personal donde comparto información sobre mí y mis proyectos.</p>-->
        </div>
    </header>
    <main class="principal">
        <section class="logo-section">
            <img src="img/logo.png" alt="mi_logo" class="logo-header">
            <!-- From Uiverse.io by Yaya12085 -->
            <div class="radio-inputs">
                <label>
                    <input class="radio-input" type="radio" name="engine">
                    <span class="radio-tile">
                        <span class="radio-icon">
                            <img src="img/6color.png" alt="Icono">

                        </span>
                        <span class="radio-label">6 COLORES</span>
                    </span>
                </label>
                <label>
                    <input checked="" class="radio-input" type="radio" name="engine">
                    <span class="radio-tile">
                        <span class="radio-icon">
                            <img src="img/8color.png" alt="Icono">
                        </span>
                        <span class="radio-label">8 COLORES</span>
                    </span>
                </label>
                <label>
                    <input class="radio-input" type="radio" name="engine">
                    <span class="radio-tile">
                        <span class="radio-icon">
                            <img src="img/9color.png" alt="Icono">

                        </span>
                        <span class="radio-label">9 COLORES</span>
                    </span>
                </label>
            </div>
        </section>
        <section class="palette-section">

            <div class="container">
                <div class="palette">
                    <div class="color"><span>264653</span></div>
                    <div class="color"><span>2A9D8F</span></div>
                    <div class="color"><span>E9C46A</span></div>
                    <div class="color"><span>F4A261</span></div>
                    <div class="color"><span>E76F51</span></div>
                    <div class="color"><span>D72638</span></div>
                    <div class="color"><span>F46036</span></div>
                    <div class="color"><span>2E294E</span></div>
                    <div class="color"><span>1B998B</span></div>

                </div>
                <div id="stats">
                    <span>Mas de 5000 colores guardados</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18">
                        <path
                            d="M4 7.5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5S5.5 9.83 5.5 9 4.83 7.5 4 7.5zm10 0c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5zm-5 0c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5S9.83 7.5 9 7.5z">
                        </path>
                    </svg>
                </div>
            </div>


            <button> Generar </button>

        </section>


    </main>

 <footer id="contacto"><!-- contenido para finalizar se coloca enlaces o contacto reales -->

        <p>&copy; 2026 Generador de Colores | Desarrollado por César Manzano</p>
    </footer>




</body>

</html>
